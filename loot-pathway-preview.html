<div id="loot-pathway-preview">
  <style>
    html, body { margin: 0; background: #070a0f; }
    #loot-pathway-preview {
      --lp-bg: #070a0e;
      --lp-panel: #0d1117;
      --lp-raised: #131821;
      --lp-line: #2b303b;
      --lp-text: #ebedf2;
      --lp-muted: #8c96a8;
      --lp-gold: #d6ab5c;
      --lp-green: #40e661;
      --lp-blue: #5e94eb;
      --lp-purple: #b873eb;
      --lp-orange: #eb853d;
      color: var(--lp-text);
      font-family: Georgia, "Times New Roman", serif;
      width: 100%;
    }
    #loot-pathway-preview * { box-sizing: border-box; }
    #loot-pathway-preview button { font: inherit; }
    #loot-pathway-preview .lp-shell {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(7,10,14,.985);
      border: 1px solid var(--lp-gold);
      box-shadow: 0 16px 44px rgba(0,0,0,.35);
    }
    #loot-pathway-preview .lp-topbar { height: 68px; position: relative; border-top: 2px solid var(--lp-gold); }
    #loot-pathway-preview .lp-title-row { width: 330px; margin: 0 auto; padding-top: 9px; display: flex; align-items: center; gap: 14px; }
    #loot-pathway-preview .lp-title-rule { height: 2px; flex: 1; background: rgba(214,171,92,.72); }
    #loot-pathway-preview .lp-title { text-align: center; font-size: 20px; letter-spacing: .02em; white-space: nowrap; }
    #loot-pathway-preview .lp-subtitle { text-align: center; color: var(--lp-muted); font: 11px Arial, sans-serif; letter-spacing: .055em; margin-top: 1px; }
    #loot-pathway-preview .lp-header-divider { position: absolute; left: 18px; right: 18px; bottom: 8px; height: 1px; background: var(--lp-line); }
    #loot-pathway-preview .lp-header-divider::after { content: ""; position: absolute; width: 72px; height: 2px; left: 50%; top: -1px; transform: translateX(-50%); background: var(--lp-gold); }
    #loot-pathway-preview .lp-close { position: absolute; right: 16px; top: 12px; width: 29px; height: 29px; background: var(--lp-panel); color: var(--lp-muted); border: 1px solid var(--lp-line); }
    #loot-pathway-preview .lp-layout { display: grid; grid-template-columns: 516px minmax(0,1fr); gap: 0; align-items: start; }
    #loot-pathway-preview .lp-character { margin: 0 16px 70px; height: 485px; border: 1px solid var(--lp-line); position: relative; background: var(--lp-panel); }
    #loot-pathway-preview .lp-name { text-align: center; margin-top: 10px; font-size: 16px; }
    #loot-pathway-preview .lp-build { text-align: center; color: var(--lp-gold); font: 11px Arial, sans-serif; margin-top: 3px; }
    #loot-pathway-preview .lp-phase-controls { display: grid; grid-template-columns: 76px 1fr 1fr 1.25fr; gap: 7px; padding: 17px 19px 0; }
    #loot-pathway-preview .lp-phase, #loot-pathway-preview .lp-filter {
      min-height: 29px; background: var(--lp-raised); border: 1px solid var(--lp-line); color: var(--lp-muted); cursor: pointer; text-transform: uppercase; font: 10px Arial, sans-serif; letter-spacing: .08em;
    }
    #loot-pathway-preview .lp-phase[data-phase="0"] { border-color: #48b88f; color: #48b88f; }
    #loot-pathway-preview .lp-phase[data-phase="1"] { border-color: var(--lp-blue); color: var(--lp-blue); }
    #loot-pathway-preview .lp-phase[data-phase="2"] { border-color: var(--lp-purple); color: var(--lp-purple); }
    #loot-pathway-preview .lp-phase.is-active { color: var(--lp-text); background: rgba(214,171,92,.14); box-shadow: inset 0 -2px currentColor; }
    #loot-pathway-preview .lp-paperdoll { position: absolute; left: 20px; right: 20px; top: 94px; bottom: 16px; }
    #loot-pathway-preview .lp-model {
      position: absolute; left: 64px; right: 64px; top: 0; bottom: 70px; overflow: hidden; background: #020305; border: 1px solid #8d6f3f;
    }
    #loot-pathway-preview .lp-model-image {
      position: absolute; width: 960px; height: 628px; max-width: none; left: -103px; top: -163px; user-select: none; pointer-events: none;
    }
    #loot-pathway-preview .lp-met { position: absolute; left: 0; right: 0; bottom: -22px; color: var(--lp-green); font: 10px Arial, sans-serif; text-align: center; }
    #loot-pathway-preview .lp-slots { position: absolute; inset: 0; pointer-events: none; }
    #loot-pathway-preview .lp-slot {
      position: absolute; width: 46px; height: 46px; border: 2px solid #087bc5; background-image: url('Assets/Screenshots/loot-pathway-main-hand.png'); background-size: 960px 628px; background-repeat: no-repeat; cursor: pointer; pointer-events: auto; padding: 0;
    }
    #loot-pathway-preview .lp-slot:hover, #loot-pathway-preview .lp-slot.is-selected { border-color: var(--lp-gold); box-shadow: 0 0 0 1px rgba(214,171,92,.35); }
    #loot-pathway-preview .lp-slot::after { content: attr(data-rank); position: absolute; left: 1px; top: 0; color: var(--lp-gold); font: 8px Arial, sans-serif; text-shadow: 0 1px 1px #000; }
    #loot-pathway-preview .lp-slot-head { left: 0; top: 23px; background-position: -40px -187px; }
    #loot-pathway-preview .lp-slot-neck { left: 0; top: 75px; background-position: -40px -239px; }
    #loot-pathway-preview .lp-slot-shoulder { left: 0; top: 127px; background-position: -40px -291px; }
    #loot-pathway-preview .lp-slot-back { left: 0; top: 179px; background-position: -40px -343px; }
    #loot-pathway-preview .lp-slot-chest { left: 0; top: 231px; background-position: -40px -395px; }
    #loot-pathway-preview .lp-slot-wrist { left: 0; top: 283px; background-position: -40px -447px; }
    #loot-pathway-preview .lp-slot-hands { right: 0; top: 7px; background-position: -432px -171px; }
    #loot-pathway-preview .lp-slot-waist { right: 0; top: 55px; background-position: -432px -219px; }
    #loot-pathway-preview .lp-slot-legs { right: 0; top: 103px; background-position: -432px -267px; }
    #loot-pathway-preview .lp-slot-feet { right: 0; top: 151px; background-position: -432px -315px; }
    #loot-pathway-preview .lp-slot-ring { right: 0; top: 199px; background-position: -432px -363px; }
    #loot-pathway-preview .lp-slot-trinket { right: 0; top: 295px; background-position: -432px -459px; }
    #loot-pathway-preview .lp-slot-main { left: 143px; bottom: 0; background-position: -181px -488px; }
    #loot-pathway-preview .lp-slot-off { left: 199px; bottom: 0; background-position: -237px -488px; }
    #loot-pathway-preview .lp-slot-ranged { left: 255px; bottom: 0; background-position: -293px -488px; }
    #loot-pathway-preview .lp-footer { position: absolute; bottom: -59px; left: 16px; right: 16px; height: 51px; border-top: 1px solid var(--lp-line); display: flex; align-items: center; justify-content: center; gap: 7px; color: var(--lp-text); font: 11px Arial, sans-serif; letter-spacing: .05em; }
    #loot-pathway-preview .lp-ns-mark { width: 24px; height: 24px; background: linear-gradient(90deg,#fff 0 50%,#11bfe8 50%); clip-path: polygon(0 0,34% 0,34% 22%,52% 22%,52% 0,70% 0,70% 38%,100% 38%,100% 100%,66% 100%,66% 74%,48% 74%,48% 52%,30% 52%,30% 100%,0 100%); }
    #loot-pathway-preview .lp-drawer { min-height: 485px; border: 1px solid var(--lp-line); background: var(--lp-panel); padding: 17px 14px; }
    #loot-pathway-preview .lp-drawer-kicker { color: var(--lp-gold); font: 10px Arial, sans-serif; letter-spacing: .09em; }
    #loot-pathway-preview .lp-drawer-title { font-size: 17px; margin-top: 19px; }
    #loot-pathway-preview .lp-drawer-copy { color: var(--lp-muted); font: 11px Arial, sans-serif; margin-top: 5px; }
    #loot-pathway-preview .lp-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 30px; }
    #loot-pathway-preview .lp-filter { padding: 0 11px; min-height: 29px; border-color: var(--lp-gold); color: var(--lp-gold); }
    #loot-pathway-preview .lp-filter[data-filter="Quest"] { border-color: var(--lp-green); color: var(--lp-green); }
    #loot-pathway-preview .lp-filter[data-filter="Dungeon / Heroic"] { border-color: var(--lp-blue); color: var(--lp-blue); }
    #loot-pathway-preview .lp-filter[data-filter="Raid"] { border-color: var(--lp-purple); color: var(--lp-purple); }
    #loot-pathway-preview .lp-filter[data-filter="Craftable"] { border-color: var(--lp-orange); color: var(--lp-orange); }
    #loot-pathway-preview .lp-filter.is-active { color: var(--lp-text); background: rgba(214,171,92,.16); }
    #loot-pathway-preview .lp-stage-header { width: 100%; min-height: 30px; margin-top: 12px; background: rgba(184,115,235,.09); border: 1px solid var(--lp-purple); color: var(--lp-purple); display: flex; align-items: center; justify-content: space-between; padding: 0 9px; cursor: pointer; text-transform: uppercase; font: 10px Arial, sans-serif; letter-spacing: .06em; }
    #loot-pathway-preview .lp-rows { display: grid; gap: 10px; margin-top: 9px; }
    #loot-pathway-preview .lp-row { position: relative; min-height: 86px; border: 1px solid var(--lp-line); background: var(--lp-raised); display: grid; grid-template-columns: 48px 1fr 28px; gap: 11px; padding: 11px; text-align: left; color: var(--lp-text); cursor: pointer; }
    #loot-pathway-preview .lp-row.is-preview { border-color: var(--lp-gold); }
    #loot-pathway-preview .lp-item-icon { width: 42px; height: 42px; background: #080b10; border-left: 3px solid var(--lp-purple); display: grid; place-items: center; color: var(--lp-gold); font: 16px Arial, sans-serif; }
    #loot-pathway-preview .lp-row-top { display: flex; align-items: center; gap: 7px; font: 10px Arial, sans-serif; color: var(--lp-gold); }
    #loot-pathway-preview .lp-chip { border: 1px solid currentColor; padding: 2px 8px; font-size: 9px; text-transform: uppercase; }
    #loot-pathway-preview .lp-item-name { display:block; margin-top: 7px; color: var(--lp-purple); font-size: 14px; }
    #loot-pathway-preview .lp-source { display:block; margin-top: 8px; color: var(--lp-muted); font: 10px Arial, sans-serif; }
    #loot-pathway-preview .lp-check { width: 25px; height: 25px; align-self: center; border: 1px solid var(--lp-line); background: #080b0f; }
    #loot-pathway-preview .lp-empty { color: var(--lp-muted); text-align: center; padding: 48px 12px; font: 12px Arial, sans-serif; }
    #loot-pathway-preview .lp-reopen { display: none; margin: 20px auto; }
    #loot-pathway-preview.is-closed .lp-shell { display: none; }
    #loot-pathway-preview.is-closed .lp-reopen { display: block; }
    @media (max-width: 820px) {
      #loot-pathway-preview .lp-layout { grid-template-columns: 1fr; }
      #loot-pathway-preview .lp-character { margin-right: 16px; }
      #loot-pathway-preview .lp-drawer { margin: 0 16px 16px; }
    }
    @media (max-width: 540px) {
      #loot-pathway-preview .lp-character { margin-left: 6px; margin-right: 6px; }
      #loot-pathway-preview .lp-phase-controls { grid-template-columns: 1fr 1fr; }
      #loot-pathway-preview .lp-paperdoll { left: 8px; right: 8px; top: 122px; }
      #loot-pathway-preview .lp-model { left: 50px; right: 50px; }
      #loot-pathway-preview .lp-model-image { left: -132px; }
      #loot-pathway-preview .lp-drawer { margin: 0 6px 6px; }
    }
  </style>

  <button type="button" class="btn lp-reopen">Open Loot Pathway preview</button>
  <section class="lp-shell" aria-label="Interactive Loot Pathway interface preview">
    <header class="lp-topbar">
      <div class="lp-title-row"><span class="lp-title-rule"></span><div class="lp-title">Loot Pathway</div><span class="lp-title-rule"></span></div>
      <div class="lp-subtitle">Click a gear slot to see its guide choices.</div>
      <div class="lp-header-divider"></div>
      <button type="button" class="lp-close" aria-label="Close preview">X</button>
    </header>
    <div class="lp-layout">
      <section class="lp-character">
        <div class="lp-name">Mozul</div>
        <div class="lp-build">Destruction guide (Auto)</div>
        <div class="lp-phase-controls" aria-label="Gear preview phase">
          <button type="button" class="lp-phase is-active" data-phase="-1">Equipped</button>
          <button type="button" class="lp-phase" data-phase="0">Pre-Raid</button>
          <button type="button" class="lp-phase" data-phase="1">Phase 1</button>
          <button type="button" class="lp-phase" data-phase="2">Phase 2</button>
        </div>
        <div class="lp-paperdoll">
          <div class="lp-model">
            <img class="lp-model-image" src="Assets/Screenshots/loot-pathway-main-hand.png" alt="Static captured character model used by the offline preview">
          </div>
          <div class="lp-slots" aria-label="Equipment slots">
            <button type="button" class="lp-slot lp-slot-head" data-slot="Head" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-neck" data-slot="Neck" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-shoulder" data-slot="Shoulders" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-back" data-slot="Back" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-chest" data-slot="Chest" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-wrist" data-slot="Wrists" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-hands is-selected" data-slot="Hands" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-waist" data-slot="Waist" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-legs" data-slot="Legs" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-feet" data-slot="Feet" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-ring" data-slot="Finger" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-trinket" data-slot="Trinket" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-main" data-slot="Main hand" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-off" data-slot="Off hand" data-rank=""></button>
            <button type="button" class="lp-slot lp-slot-ranged" data-slot="Ranged" data-rank=""></button>
          </div>
          <div class="lp-met">MET = THIS GUIDE ITEM IS EQUIPPED</div>
        </div>
        <footer class="lp-footer"><span class="lp-ns-mark" aria-hidden="true"></span><span>Northern Stack Studios</span></footer>
      </section>

      <aside class="lp-drawer">
        <div class="lp-drawer-kicker">GUIDE CHOICES</div>
        <div class="lp-drawer-title"><span data-drawer-slot>Hands</span></div>
        <div class="lp-drawer-copy">Guide-ranked as Best, Strong or Option. Filter by source.</div>
        <div class="lp-filters" aria-label="Source filter">
          <button type="button" class="lp-filter is-active" data-filter="All">All</button>
          <button type="button" class="lp-filter" data-filter="Quest">Quest</button>
          <button type="button" class="lp-filter" data-filter="Dungeon / Heroic">Dungeon / Heroic</button>
          <button type="button" class="lp-filter" data-filter="Raid">Raid</button>
          <button type="button" class="lp-filter" data-filter="Craftable">Craftable</button>
        </div>
        <button type="button" class="lp-stage-header" aria-expanded="true"><span>Phase 2</span><span data-count>3 items&nbsp;&nbsp;-</span></button>
        <div class="lp-rows" aria-live="polite"></div>
      </aside>
    </div>
  </section>

  <script>
    (() => {
      const root = document.getElementById('loot-pathway-preview');
      const data = {
        'Hands': [
          {rank:1,name:'Spellfire Gloves',kind:'Craftable',source:'Tailoring (365)',level:105},
          {rank:2,name:'Voidheart Gloves',kind:'Raid',source:'Karazhan - Curator',level:120},
          {rank:3,name:'Gloves of the Deadwatcher',kind:'Dungeon / Heroic',source:'Auchenai Crypts - Shirrak (H)',level:115}
        ],
        'Head': [
          {rank:1,name:'Spellstrike Hood',kind:'Craftable',source:'Tailoring (375)',level:105},
          {rank:2,name:"Evoker's Helmet of Second Sight",kind:'Quest',source:'Shadowmoon Valley quest',level:109},
          {rank:3,name:'Hood of Oblivion',kind:'Dungeon / Heroic',source:'The Arcatraz - Harbinger Skyriss (N) (H)',level:115}
        ],
        'Main hand': [
          {rank:1,name:"Merciless Gladiator's Spellblade",kind:'Other',source:'Arena Vendor',level:136},
          {rank:2,name:'Fang of the Leviathan',kind:'Raid',source:'Serpentshrine Cavern - Leotheras',level:134},
          {rank:3,name:'Atiesh, Greatstaff of the Guardian',kind:'Quest',source:'Legendary quest',level:90}
        ],
        'Trinket': [
          {rank:1,name:"Quagmirran's Eye",kind:'Dungeon / Heroic',source:'The Slave Pens - Quagmirran (H)',level:115},
          {rank:2,name:'Icon of the Silver Crescent',kind:'Dungeon / Heroic',source:'Badge of Justice vendor',level:110}
        ]
      };
      const generic = slot => [
        {rank:1,name:`Best-ranked ${slot.toLowerCase()} choice`,kind:'Raid',source:'Current phase guide',level:120},
        {rank:2,name:`Alternative ${slot.toLowerCase()} item`,kind:'Dungeon / Heroic',source:'Dungeon boss (N) (H)',level:115}
      ];
      let slot = 'Hands';
      let filter = 'All';
      let phase = -1;
      let selected = null;
      let collapsed = false;
      const rows = root.querySelector('.lp-rows');
      function renderRows() {
        const items = (data[slot] || generic(slot)).filter(item => filter === 'All' || item.kind === filter);
        root.querySelector('[data-drawer-slot]').textContent = slot;
        root.querySelector('[data-count]').textContent = `${items.length} ${items.length === 1 ? 'item' : 'items'}  ${collapsed ? '+' : '-'}`;
        rows.hidden = collapsed;
        rows.innerHTML = items.length ? items.map(item => `
          <button type="button" class="lp-row${selected && selected.name === item.name ? ' is-preview' : ''}" data-item="${item.name.replace(/"/g,'&quot;')}">
            <span class="lp-item-icon">${item.rank}</span>
            <span>
              <span class="lp-row-top"><strong>#${item.rank}</strong><span class="lp-chip">BIS</span><span class="lp-chip">${item.kind}</span><span>i${item.level}</span></span>
              <span class="lp-item-name">${item.name}</span>
              <span class="lp-source">${item.source}</span>
            </span>
            <span class="lp-check" aria-hidden="true"></span>
          </button>`).join('') : '<div class="lp-empty">No items match this source filter.</div>';
        rows.querySelectorAll('.lp-row').forEach(button => button.addEventListener('click', () => {
          const item = items.find(candidate => candidate.name === button.dataset.item);
          selected = selected && selected.name === item.name ? null : item;
          renderRows();
        }));
      }
      root.querySelectorAll('.lp-phase').forEach(button => button.addEventListener('click', () => {
        phase = Number(button.dataset.phase);
        selected = null;
        root.querySelectorAll('.lp-phase').forEach(peer => peer.classList.toggle('is-active', peer === button));
        root.querySelectorAll('.lp-slot').forEach(item => item.dataset.rank = phase < 0 ? '' : (phase === 0 ? 'PR BEST' : `P${phase} BEST`));
        renderRows();
      }));
      root.querySelectorAll('.lp-filter').forEach(button => button.addEventListener('click', () => {
        filter = button.dataset.filter;
        root.querySelectorAll('.lp-filter').forEach(peer => peer.classList.toggle('is-active', peer === button));
        renderRows();
      }));
      root.querySelectorAll('.lp-slot').forEach(button => button.addEventListener('click', () => {
        slot = button.dataset.slot;
        selected = null;
        root.querySelectorAll('.lp-slot').forEach(peer => peer.classList.toggle('is-selected', peer === button));
        renderRows();
      }));
      root.querySelector('.lp-stage-header').addEventListener('click', event => {
        collapsed = !collapsed;
        event.currentTarget.setAttribute('aria-expanded', String(!collapsed));
        renderRows();
      });
      root.querySelector('.lp-close').addEventListener('click', () => root.classList.add('is-closed'));
      root.querySelector('.lp-reopen').addEventListener('click', () => root.classList.remove('is-closed'));
      renderRows();
    })();
  </script>
</div>
