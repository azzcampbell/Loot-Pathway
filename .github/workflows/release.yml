name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1.5"

      - name: Check Lua syntax
        run: luac -p Core.lua Data.lua BisData.lua WowheadCorrections.lua DungeonDifficultyData.lua Engine.lua Diagnostics.lua UI.lua

      - name: Require Lua behaviour tests
        shell: pwsh
        run: ./tests/Test-LuaEngine.ps1 -RequireLua

      - name: Verify tag and addon version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $toc = Get-Content -LiteralPath .\LootPathway_TBC.toc -Raw
          $match = [regex]::Match($toc, '(?m)^## Version:\s*([^\r\n]+)')
          if (-not $match.Success) { throw 'Missing Version field in LootPathway_TBC.toc.' }
          $tocVersion = $match.Groups[1].Value.Trim()
          if ($tocVersion -ne $version) {
            throw "Tag version $version does not match TOC version $tocVersion."
          }
          $changelog = Get-Content -LiteralPath .\CHANGELOG.md -Raw
          if ($changelog -notmatch "(?m)^# Loot Pathway $([regex]::Escape($version))\s*$") {
            throw "CHANGELOG.md is not approved for Loot Pathway $version."
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build addon ZIP
        shell: pwsh
        run: .\Build-Release.ps1

      - name: Create GitHub release and changelog
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "LootPathway-$env:RELEASE_VERSION.zip" `
            --title "Loot Pathway $env:RELEASE_VERSION" `
            --notes-file "CHANGELOG.md"

      - name: Trigger CurseForge packaging
        shell: pwsh
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CURSEFORGE_API_TOKEN)) {
            throw 'The CURSEFORGE_API_TOKEN repository secret is missing.'
          }
          $packageUri = "https://www.curseforge.com/api/projects/1619865/package?token=$env:CURSEFORGE_API_TOKEN"
          Invoke-WebRequest -Method Post -Uri $packageUri -UseBasicParsing | Out-Null
